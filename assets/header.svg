<svg width="840" height="340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="rc"><rect width="840" height="340" rx="10"/></clipPath>
  </defs>

  <g clip-path="url(#rc)">
    <!-- BG -->
    <rect width="840" height="340" fill="#0d1117"/>

    <!-- Subtle scanlines -->
    <g opacity="0.03">
      <line x1="0" y1="50" x2="840" y2="50" stroke="#ffffff" stroke-width="0.5"/>
      <line x1="0" y1="52" x2="840" y2="52" stroke="#ffffff" stroke-width="0.5"/>
      <line x1="0" y1="80" x2="840" y2="80" stroke="#ffffff" stroke-width="0.5"/>
      <line x1="0" y1="82" x2="840" y2="82" stroke="#ffffff" stroke-width="0.5"/>
      <line x1="0" y1="110" x2="840" y2="110" stroke="#ffffff" stroke-width="0.5"/>
      <line x1="0" y1="112" x2="840" y2="112" stroke="#ffffff" stroke-width="0.5"/>
      <line x1="0" y1="140" x2="840" y2="140" stroke="#ffffff" stroke-width="0.5"/>
      <line x1="0" y1="142" x2="840" y2="142" stroke="#ffffff" stroke-width="0.5"/>
      <line x1="0" y1="170" x2="840" y2="170" stroke="#ffffff" stroke-width="0.5"/>
      <line x1="0" y1="172" x2="840" y2="172" stroke="#ffffff" stroke-width="0.5"/>
      <line x1="0" y1="200" x2="840" y2="200" stroke="#ffffff" stroke-width="0.5"/>
      <line x1="0" y1="202" x2="840" y2="202" stroke="#ffffff" stroke-width="0.5"/>
      <line x1="0" y1="230" x2="840" y2="230" stroke="#ffffff" stroke-width="0.5"/>
      <line x1="0" y1="232" x2="840" y2="232" stroke="#ffffff" stroke-width="0.5"/>
      <line x1="0" y1="260" x2="840" y2="260" stroke="#ffffff" stroke-width="0.5"/>
      <line x1="0" y1="262" x2="840" y2="262" stroke="#ffffff" stroke-width="0.5"/>
      <line x1="0" y1="290" x2="840" y2="290" stroke="#ffffff" stroke-width="0.5"/>
      <line x1="0" y1="292" x2="840" y2="292" stroke="#ffffff" stroke-width="0.5"/>
      <line x1="0" y1="320" x2="840" y2="320" stroke="#ffffff" stroke-width="0.5"/>
      <line x1="0" y1="322" x2="840" y2="322" stroke="#ffffff" stroke-width="0.5"/>
    </g>

    <!-- Title bar -->
    <rect width="840" height="36" fill="#161b22"/>
    <line x1="0" y1="36" x2="840" y2="36" stroke="#30363d" stroke-width="0.5"/>

    <!-- Traffic lights -->
    <circle cx="22" cy="18" r="6" fill="#ff5f56"/>
    <circle cx="42" cy="18" r="6" fill="#ffbd2e"/>
    <circle cx="62" cy="18" r="6" fill="#27c93f"/>

    <!-- Window title -->
    <text x="420" y="23" font-family="ui-monospace,SFMono-Regular,'SF Mono','Cascadia Code','JetBrains Mono',Menlo,Consolas,monospace" font-size="12" fill="#7d8590" text-anchor="middle">parth@github — zsh — 80×24</text>

    <!-- ═══ COMMAND ═══ -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="0.4s" dur="0.12s" fill="freeze"/>
      <text x="32" y="66" font-family="ui-monospace,SFMono-Regular,'SF Mono',Consolas,monospace" font-size="14" fill="#22c55e">❯</text>
      <text x="52" y="66" font-family="ui-monospace,SFMono-Regular,'SF Mono',Consolas,monospace" font-size="14" fill="#e6edf3">./parth.sh</text>
      <text x="140" y="66" font-family="ui-monospace,SFMono-Regular,'SF Mono',Consolas,monospace" font-size="14" fill="#7d8590"> --init-profile</text>
    </g>

    <!-- ═══ LOADING LINE 1: CP ═══ -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="1.0s" dur="0.08s" fill="freeze"/>
      <rect x="32" y="84" width="6" height="6" rx="1" fill="#27c93f"/>
      <text x="48" y="92" font-family="ui-monospace,SFMono-Regular,'SF Mono',Consolas,monospace" font-size="13" fill="#e6edf3">competitive_programming</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="1.3s" dur="0.08s" fill="freeze"/>
      <text x="260" y="92" font-family="ui-monospace,SFMono-Regular,'SF Mono',Consolas,monospace" font-size="13" fill="#30363d">·························</text>
      <text x="530" y="92" font-family="ui-monospace,SFMono-Regular,'SF Mono',Consolas,monospace" font-size="13" fill="#7d8590">hackercup_r3</text>
      <text x="640" y="92" font-family="ui-monospace,SFMono-Regular,'SF Mono',Consolas,monospace" font-size="13" fill="#3fb950" font-weight="bold">#186 global</text>
    </g>

    <!-- ═══ LOADING LINE 2: AI ═══ -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="1.6s" dur="0.08s" fill="freeze"/>
      <rect x="32" y="110" width="6" height="6" rx="1" fill="#27c93f"/>
      <text x="48" y="118" font-family="ui-monospace,SFMono-Regular,'SF Mono',Consolas,monospace" font-size="13" fill="#e6edf3">ai_ml_pipeline</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="1.9s" dur="0.08s" fill="freeze"/>
      <text x="260" y="118" font-family="ui-monospace,SFMono-Regular,'SF Mono',Consolas,monospace" font-size="13" fill="#30363d">·························</text>
      <text x="530" y="118" font-family="ui-monospace,SFMono-Regular,'SF Mono',Consolas,monospace" font-size="13" fill="#7d8590">langchain · rag · agents · mcp</text>
    </g>

    <!-- ═══ LOADING LINE 3: BACKEND ═══ -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.2s" dur="0.08s" fill="freeze"/>
      <rect x="32" y="136" width="6" height="6" rx="1" fill="#27c93f"/>
      <text x="48" y="144" font-family="ui-monospace,SFMono-Regular,'SF Mono',Consolas,monospace" font-size="13" fill="#e6edf3">distributed_systems</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.5s" dur="0.08s" fill="freeze"/>
      <text x="260" y="144" font-family="ui-monospace,SFMono-Regular,'SF Mono',Consolas,monospace" font-size="13" fill="#30363d">·························</text>
      <text x="530" y="144" font-family="ui-monospace,SFMono-Regular,'SF Mono',Consolas,monospace" font-size="13" fill="#7d8590">kafka · redis · k8s · docker</text>
    </g>

    <!-- ═══ LOADING LINE 4: FRONTEND ═══ -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.8s" dur="0.08s" fill="freeze"/>
      <rect x="32" y="162" width="6" height="6" rx="1" fill="#27c93f"/>
      <text x="48" y="170" font-family="ui-monospace,SFMono-Regular,'SF Mono',Consolas,monospace" font-size="13" fill="#e6edf3">full_stack_frameworks</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="3.1s" dur="0.08s" fill="freeze"/>
      <text x="260" y="170" font-family="ui-monospace,SFMono-Regular,'SF Mono',Consolas,monospace" font-size="13" fill="#30363d">·························</text>
      <text x="530" y="170" font-family="ui-monospace,SFMono-Regular,'SF Mono',Consolas,monospace" font-size="13" fill="#7d8590">next.js · react · fastapi</text>
    </g>

    <!-- ═══ PROGRESS BAR ═══ -->
    <!-- Track -->
    <rect x="32" y="198" width="776" height="5" rx="2.5" fill="#21262d" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="3.4s" dur="0.1s" fill="freeze"/>
    </rect>
    <!-- Fill -->
    <rect x="32" y="198" width="0" height="5" rx="2.5" fill="#22c55e">
      <animate attributeName="width" from="0" to="776" begin="3.5s" dur="1s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </rect>
    <!-- Glow behind bar -->
    <rect x="32" y="196" width="0" height="9" rx="4.5" fill="#22c55e" opacity="0.15">
      <animate attributeName="width" from="0" to="776" begin="3.5s" dur="1s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </rect>
    <!-- Percentage -->
    <text x="808" y="204" font-family="ui-monospace,SFMono-Regular,'SF Mono',Consolas,monospace" font-size="11" fill="#3fb950" text-anchor="end" opacity="0">
      100%
      <animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.15s" fill="freeze"/>
    </text>

    <!-- ═══ NAME REVEAL ═══ -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="4.8s" dur="0.6s" fill="freeze"/>
      <text x="420" y="254" font-family="ui-monospace,SFMono-Regular,'SF Mono',Consolas,monospace" font-size="34" fill="#ffffff" font-weight="bold" text-anchor="middle" letter-spacing="3">PARTH KUMAR SINGH</text>
    </g>

    <!-- ═══ SUBTITLE ═══ -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="5.4s" dur="0.4s" fill="freeze"/>
      <text x="420" y="282" font-family="ui-monospace,SFMono-Regular,'SF Mono',Consolas,monospace" font-size="13" fill="#22c55e" text-anchor="middle" letter-spacing="2">FULL-STACK ENGINEER · AI SYSTEMS · COMPETITIVE PROGRAMMER</text>
    </g>

    <!-- ═══ ACCENT LINE ═══ -->
    <line x1="310" y1="296" x2="310" y2="296" stroke="#22c55e" stroke-width="1" opacity="0.4">
      <animate attributeName="x1" from="420" to="310" begin="5.8s" dur="0.4s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
      <animate attributeName="x2" from="420" to="530" begin="5.8s" dur="0.4s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
      <animate attributeName="opacity" from="0" to="0.4" begin="5.8s" dur="0.3s" fill="freeze"/>
    </line>

    <!-- ═══ CURSOR ═══ -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="6.2s" dur="0.1s" fill="freeze"/>
      <text x="32" y="326" font-family="ui-monospace,SFMono-Regular,'SF Mono',Consolas,monospace" font-size="14" fill="#22c55e">❯</text>
      <rect x="52" y="313" width="8" height="16" rx="1" fill="#22c55e">
        <animate attributeName="opacity" values="1;1;0;0;1" dur="1.2s" repeatCount="indefinite" begin="6.2s"/>
      </rect>
    </g>
  </g>
</svg>
